name: Sync from Google Drive

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/sync-from-drive.yml'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create data directory
        run: |
          mkdir -p data
          echo "✅ data 目錄已建立"

      - name: Clean data directory
        run: |
          echo "🧹 清空 data/ 目錄..."
          rm -rf data/*
          mkdir -p data
          echo "✅ 目錄已清空"

      - name: Install gdown
        run: |
          pip install --upgrade gdown
          gdown --version

      - name: Download from Google Drive
        env:
          FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          if [ -z "$FOLDER_ID" ]; then
            echo "❌ 錯誤: GOOGLE_DRIVE_FOLDER_ID 未設定"
            exit 1
          fi
          
          echo "📂 Google Drive 資料夾 ID: $FOLDER_ID"
          echo "📌 請確保資料夾權限設為「知道連結的人均可檢視」"
          
          # 嘗試下載
          echo "🔍 開始下載..."
          
          # 使用 --no-cookies 和 --no-check-certificate 避免問題
          gdown --folder "https://drive.google.com/drive/folders/$FOLDER_ID" \
                -O /tmp/gdrive/ \
                --remaining-ok \
                --no-cookies || {
            echo ""
            echo "❌ 下載失敗！可能原因："
            echo "  1. 資料夾權限未設為公開"
            echo "  2. 資料夾 ID 錯誤"
            echo "  3. Google Drive 暫時限制"
            echo ""
            echo "🔧 解決方法："
            echo "  1. 前往 Google Drive 資料夾"
            echo "  2. 點擊「分享」"
            echo "  3. 將權限改為「知道連結的人均可檢視」"
            echo "  4. 重新運行 workflow"
            exit 1
          }
          
          # 複製 JSON 檔案
          echo "📁 複製 JSON 檔案..."
          find /tmp/gdrive -type f -name "*.json" -exec cp -v {} data/ \;
          
          # 統計結果
          JSON_COUNT=$(ls data/*.json 2>/dev/null | wc -l)
          echo ""
          echo "📊 下載完成：共 $JSON_COUNT 個 JSON 檔案"
          
          if [ $JSON_COUNT -eq 0 ]; then
            echo "❌ 沒有找到任何 JSON 檔案"
            echo ""
            echo "📂 /tmp/gdrive 目錄內容："
            ls -la /tmp/gdrive/ || echo "目錄不存在"
            exit 1
          fi
          
          echo ""
          echo "📋 已下載的檔案："
          ls -la data/

      - name: Validate JSON files
        run: |
          if ! command -v jq &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi
          
          echo "🔍 驗證 JSON 格式..."
          
          for file in data/*.json; do
            if [ -f "$file" ]; then
              if jq empty "$file" 2>/dev/null; then
                echo "✅ $(basename "$file")"
              else
                echo "❌ $(basename "$file") - 格式錯誤"
                exit 1
              fi
            fi
          done
          
          echo "🎉 所有 JSON 檔案驗證通過"

      - name: Create index file
        run: |
          cd data
          
          echo "{" > units-index.json
          echo "  \"units\": [" >> units-index.json
          
          first=true
          
          for file in *.json; do
            if [ "$file" = "units-index.json" ]; then
              continue
            fi
            
            if [ -f "$file" ]; then
              if [ "$first" = true ]; then
                first=false
              else
                echo "," >> units-index.json
              fi
              
              # 讀取 unit 數據
              UNIT_ID=$(jq -r '.unit_id // ""' "$file" 2>/dev/null)
              UNIT_TITLE=$(jq -r '.unit_title // ""' "$file" 2>/dev/null)
              UNIT_DESC=$(jq -r '.unit_description // ""' "$file" 2>/dev/null)
              GRADE=$(jq -c '.grade // []' "$file" 2>/dev/null)
              PUBLISHER=$(jq -c '.publisher // []' "$file" 2>/dev/null)
              DIFFICULTY=$(jq -r '.difficulty // "intermediate"' "$file" 2>/dev/null)
              WORDS_COUNT=$(jq '.words | length' "$file" 2>/dev/null)
              SENTENCES_COUNT=$(jq '.sentences | length' "$file" 2>/dev/null)
              
              # 如果 unit_id 為空，使用檔名
              if [ -z "$UNIT_ID" ] || [ "$UNIT_ID" = "null" ]; then
                UNIT_ID=$(basename "$file" .json)
              fi
              
              # 如果 unit_title 為空，使用檔名
              if [ -z "$UNIT_TITLE" ] || [ "$UNIT_TITLE" = "null" ]; then
                UNIT_TITLE=$(basename "$file" .json)
              fi
              
              CREATED_DATE=$(date +%Y-%m-%d)
              
              # 寫入索引
              echo "    {" >> units-index.json
              echo "      \"id\": \"$UNIT_ID\"," >> units-index.json
              echo "      \"title\": \"$UNIT_TITLE\"," >> units-index.json
              echo "      \"description\": \"$UNIT_DESC\"," >> units-index.json
              
              if [ "$GRADE" != "[]" ]; then
                echo "      \"grade\": $GRADE," >> units-index.json
              fi
              
              if [ "$PUBLISHER" != "[]" ]; then
                echo "      \"publisher\": $PUBLISHER," >> units-index.json
              fi
              
              echo "      \"words_count\": $WORDS_COUNT," >> units-index.json
              echo "      \"sentences_count\": $SENTENCES_COUNT," >> units-index.json
              echo "      \"difficulty\": \"$DIFFICULTY\"," >> units-index.json
              echo "      \"created\": \"$CREATED_DATE\"" >> units-index.json
              echo -n "    }" >> units-index.json
            fi
          done
          
          echo "" >> units-index.json
          echo "  ]" >> units-index.json
          echo "}" >> units-index.json
          
          # 驗證索引
          if jq empty units-index.json 2>/dev/null; then
            INDEX_COUNT=$(jq '.units | length' units-index.json)
            echo "✅ 索引檔已產生，共 $INDEX_COUNT 個單元"
          else
            echo "❌ 索引檔案格式錯誤"
            cat units-index.json
            exit 1
          fi

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          
          if git diff --staged --quiet; then
            echo "📭 沒有變更，跳過提交"
          else
            git commit -m "🤖 自動同步 Google Drive 教材 - $(date '+%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ 已提交並推送更新"
          fi
