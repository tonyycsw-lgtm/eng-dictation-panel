<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理後台 · 英語默書練習系統</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            background: #f1f5f9;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: #1e293b;
            font-size: 24px;
        }
        
        .header h1 i {
            color: #4f46e5;
            margin-right: 10px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        
        .stat-card .label {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .stat-card .value {
            color: #1e293b;
            font-size: 32px;
            font-weight: 700;
        }
        
        .search-bar {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
        }
        
        .search-bar input {
            flex: 1;
            padding: 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .search-bar button {
            padding: 12px 24px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 8px 16px;
            border: 1px solid #e2e8f0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .filter-btn:hover {
            background: #f1f5f9;
            border-color: #4f46e5;
        }
        
        .filter-btn.active {
            background: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }
        
        .users-table {
            background: white;
            border-radius: 12px;
            overflow-x: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        
        th {
            background: #f8fafc;
            padding: 12px 16px;
            text-align: left;
            color: #475569;
            font-weight: 600;
            font-size: 13px;
        }
        
        td {
            padding: 12px 16px;
            border-bottom: 1px solid #e2e8f0;
            color: #334155;
            font-size: 13px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
        
        .btn-toggle {
            padding: 6px 12px;
            border: 1px solid #cbd5e1;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .btn-toggle:hover {
            background: #f1f5f9;
        }
        
        .load-more-btn {
            background: #f1f5f9;
            border: 1px dashed #cbd5e1;
            color: #4f46e5;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 20px auto;
        }
        
        .load-more-btn:hover {
            background: #e2e8f0;
            border-color: #4f46e5;
        }
        
        .load-more-container {
            text-align: center;
            padding: 20px;
        }
        
        .unauthorized {
            text-align: center;
            margin-top: 100px;
            padding: 40px;
            background: white;
            border-radius: 12px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .unauthorized i {
            font-size: 64px;
            color: #ef4444;
            margin-bottom: 20px;
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-online {
            background: #dcfce7;
            color: #166534;
        }
        
        .status-offline {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .status-recent {
            background: #fef3c7;
            color: #92400e;
        }
        
        .activity-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        
        .dot-online { background: #10b981; }
        .dot-recent { background: #f59e0b; }
        .dot-offline { background: #ef4444; }
        
        .time-cell {
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { 
            getAuth, 
            signOut, 
            onAuthStateChanged, 
            GoogleAuthProvider, 
            signInWithPopup 
        } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
        import { 
            getFirestore, 
            collection, 
            getDocs, 
            getCountFromServer, 
            query, 
            orderBy, 
            limit, 
            startAfter, 
            where 
        } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyABfaBvx5ovgYDGfCMyparh8JjqVtIRr8M",
            authDomain: "eng-dictation-panel.firebaseapp.com",
            projectId: "eng-dictation-panel",
            storageBucket: "eng-dictation-panel.firebasestorage.app",
            messagingSenderId: "428851908520",
            appId: "1:428851908520:web:9ce49c5034ed1d193fd79d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentFilter = 'all';
        let lastVisible = null;
        let isLoading = false;
        let hasMore = true;
        const PAGE_SIZE = 20;
        
        let currentUserIsAdmin = false;
        let currentUserIsTeacher = false;

        // 格式化時間
        function formatTime(minutes) {
            if (!minutes || minutes === 0) return '0 分鐘';
            if (minutes < 60) return `${Math.round(minutes)} 分鐘`;
            const hours = Math.floor(minutes / 60);
            const mins = Math.round(minutes % 60);
            return mins > 0 ? `${hours} 小時 ${mins} 分鐘` : `${hours} 小時`;
        }

        // 獲取活躍狀態
        function getActivityStatus(lastActiveAt) {
            if (!lastActiveAt) {
                return { status: '從未活躍', class: 'status-offline', dot: 'dot-offline' };
            }
            
            const last = new Date(lastActiveAt);
            const now = new Date();
            const diffMinutes = Math.floor((now - last) / (1000 * 60));
            
            if (diffMinutes < 5) {
                return { status: '在線中', class: 'status-online', dot: 'dot-online' };
            } else if (diffMinutes < 60) {
                return { status: `${diffMinutes} 分鐘前`, class: 'status-recent', dot: 'dot-recent' };
            } else if (diffMinutes < 1440) {
                const hours = Math.floor(diffMinutes / 60);
                return { status: `${hours} 小時前`, class: 'status-offline', dot: 'dot-offline' };
            } else {
                const days = Math.floor(diffMinutes / 1440);
                return { status: `${days} 天前`, class: 'status-offline', dot: 'dot-offline' };
            }
        }

        // 格式化日期
        function formatDate(dateValue) {
            if (!dateValue) return '-';
            try {
                if (dateValue.seconds) {
                    return new Date(dateValue.seconds * 1000).toLocaleDateString('zh-HK');
                }
                return new Date(dateValue).toLocaleDateString('zh-HK');
            } catch {
                return '-';
            }
        }

        // 生成用戶行
        function generateUserRow(docId, user) {
            const activity = getActivityStatus(user.lastActiveAt || user.lastLoginAt);
            const totalTime = formatTime(user.totalLearningTime || 0);
            const lastActiveDate = formatDate(user.lastActiveAt || user.lastLoginAt);
            const loginCount = user.loginCount || 0;
            const createdAt = formatDate(user.createdAt);
            
            return `
                <tr>
                    <td><strong>${escapeHtml(user.displayName || '-')}</strong></td>
                    <td>${escapeHtml(user.email || '-')}</td>
                    <td class="time-cell">${createdAt}</td>
                    <td class="time-cell">${lastActiveDate}</td>
                    <td><span class="status-badge ${activity.class}"><span class="activity-dot ${activity.dot}"></span>${activity.status}</span></td>
                    <td>${loginCount} 次</td>
                    <td>${totalTime}</td>
                </tr>
            `;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // 更新統計
        async function updateStats() {
            try {
                const usersRef = collection(db, 'users');
                const totalSnapshot = await getCountFromServer(usersRef);
                
                const fiveMinAgo = new Date(Date.now() - 5 * 60 * 1000).toISOString();
                const onlineQuery = query(usersRef, where('lastActiveAt', '>=', fiveMinAgo));
                const onlineSnapshot = await getCountFromServer(onlineQuery);
                
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const todayQuery = query(usersRef, where('lastActiveAt', '>=', today.toISOString()));
                const todaySnapshot = await getCountFromServer(todayQuery);
                
                const weekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();
                const weekQuery = query(usersRef, where('lastActiveAt', '>=', weekAgo));
                const weekSnapshot = await getCountFromServer(weekQuery);
                
                document.getElementById('totalUsers').textContent = totalSnapshot.data().count;
                document.getElementById('onlineUsers').textContent = onlineSnapshot.data().count;
                document.getElementById('todayActive').textContent = todaySnapshot.data().count;
                document.getElementById('weekActive').textContent = weekSnapshot.data().count;
            } catch (error) {
                console.error('更新統計失敗:', error);
            }
        }

        // 載入用戶列表
        async function loadUsers(filter, loadMore = false) {
            const usersList = document.getElementById('usersList');
            const loadMoreContainer = document.getElementById('loadMoreContainer');
            
            if (!usersList) return;
            if (!loadMore) {
                usersList.innerHTML = '<tr><td colspan="7" class="loading">載入中...</td></tr>';
                if (loadMoreContainer) loadMoreContainer.style.display = 'none';
            }
            if (isLoading || !hasMore) return;
            isLoading = true;
            
            try {
                const usersRef = collection(db, 'users');
                let q;
                
                if (filter === 'all') {
                    q = lastVisible ? 
                        query(usersRef, orderBy('lastActiveAt', 'desc'), startAfter(lastVisible), limit(PAGE_SIZE)) : 
                        query(usersRef, orderBy('lastActiveAt', 'desc'), limit(PAGE_SIZE));
                } else if (filter === 'online') {
                    const fiveMinAgo = new Date(Date.now() - 5 * 60 * 1000).toISOString();
                    q = lastVisible ? 
                        query(usersRef, where('lastActiveAt', '>=', fiveMinAgo), orderBy('lastActiveAt', 'desc'), startAfter(lastVisible), limit(PAGE_SIZE)) : 
                        query(usersRef, where('lastActiveAt', '>=', fiveMinAgo), orderBy('lastActiveAt', 'desc'), limit(PAGE_SIZE));
                } else if (filter === 'today') {
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    q = lastVisible ? 
                        query(usersRef, where('lastActiveAt', '>=', today.toISOString()), orderBy('lastActiveAt', 'desc'), startAfter(lastVisible), limit(PAGE_SIZE)) : 
                        query(usersRef, where('lastActiveAt', '>=', today.toISOString()), orderBy('lastActiveAt', 'desc'), limit(PAGE_SIZE));
                } else if (filter === 'week') {
                    const weekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();
                    q = lastVisible ? 
                        query(usersRef, where('lastActiveAt', '>=', weekAgo), orderBy('lastActiveAt', 'desc'), startAfter(lastVisible), limit(PAGE_SIZE)) : 
                        query(usersRef, where('lastActiveAt', '>=', weekAgo), orderBy('lastActiveAt', 'desc'), limit(PAGE_SIZE));
                } else {
                    q = query(usersRef, orderBy('lastActiveAt', 'desc'), limit(PAGE_SIZE));
                }
                
                const querySnapshot = await getDocs(q);
                lastVisible = querySnapshot.docs[querySnapshot.docs.length - 1];
                hasMore = querySnapshot.docs.length === PAGE_SIZE;
                
                if (querySnapshot.empty && !loadMore) {
                    usersList.innerHTML = '<tr><td colspan="7" class="loading">沒有找到用戶</td></tr>';
                    return;
                }
                
                let html = loadMore ? usersList.innerHTML : '';
                querySnapshot.forEach(doc => {
                    html += generateUserRow(doc.id, doc.data());
                });
                usersList.innerHTML = html;
                
                if (loadMoreContainer) {
                    loadMoreContainer.style.display = hasMore ? 'block' : 'none';
                }
            } catch (error) {
                console.error('載入用戶失敗:', error);
                if (!loadMore) {
                    usersList.innerHTML = `<tr><td colspan="7" class="loading">載入失敗: ${error.message}</td></tr>`;
                }
            } finally {
                isLoading = false;
            }
        }

        async function performSearch() {
            const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
            const usersList = document.getElementById('usersList');
            const loadMoreContainer = document.getElementById('loadMoreContainer');
            
            if (!searchTerm) {
                lastVisible = null;
                hasMore = true;
                loadUsers(currentFilter, false);
                return;
            }
            
            usersList.innerHTML = '<tr><td colspan="7" class="loading">搜尋中...</td></tr>';
            if (loadMoreContainer) loadMoreContainer.style.display = 'none';
            
            try {
                const usersRef = collection(db, 'users');
                const q = query(usersRef, limit(200));
                const querySnapshot = await getDocs(q);
                let html = '', matchCount = 0;
                
                querySnapshot.forEach(doc => {
                    const user = doc.data();
                    const email = (user.email || '').toLowerCase();
                    const displayName = (user.displayName || '').toLowerCase();
                    
                    if (email.includes(searchTerm) || displayName.includes(searchTerm)) {
                        matchCount++;
                        html += generateUserRow(doc.id, user);
                    }
                });
                
                if (matchCount === 0) {
                    usersList.innerHTML = `<tr><td colspan="7" class="loading">沒有找到符合「${searchTerm}」的用戶</td></tr>`;
                } else {
                    usersList.innerHTML = html;
                }
            } catch (error) {
                usersList.innerHTML = `<tr><td colspan="7" class="loading">搜尋失敗: ${error.message}</td></tr>`;
            }
        }

        // Google 登入
        window.loginWithGoogle = async () => {
            try {
                const provider = new GoogleAuthProvider();
                provider.setCustomParameters({ prompt: 'select_account' });
                await signInWithPopup(auth, provider);
                window.location.reload();
            } catch (error) {
                alert('登入失敗：' + error.message);
            }
        };

        // 登出
        window.logout = async () => {
            await signOut(auth);
            window.location.reload();
        };

        // 篩選
        window.filterUsers = (filter) => {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            currentFilter = filter;
            lastVisible = null;
            hasMore = true;
            loadUsers(filter, false);
        };

        window.searchUsers = () => performSearch();
        window.loadMoreUsers = () => loadUsers(currentFilter, true);

        // 載入管理介面
        async function loadAdminInterface(container, user) {
            container.innerHTML = `
                <div class="container">
                    <div class="header">
                        <h1><i class="fas fa-chalkboard-teacher"></i> 學生活躍度管理 · 英語默書系統</h1>
                        <div>
                            <span style="margin-right: 15px; color: #64748b;">${escapeHtml(user.email)} ${currentUserIsAdmin ? '👑 管理員' : (currentUserIsTeacher ? '🏫 老師' : '')}</span>
                            <button onclick="logout()" class="btn-toggle">登出</button>
                        </div>
                    </div>
                    
                    <div class="stats">
                        <div class="stat-card"><div class="label">總學生數</div><div class="value" id="totalUsers">-</div></div>
                        <div class="stat-card"><div class="label">🟢 在線中</div><div class="value" id="onlineUsers">-</div></div>
                        <div class="stat-card"><div class="label">📅 今日活躍</div><div class="value" id="todayActive">-</div></div>
                        <div class="stat-card"><div class="label">📊 本週活躍</div><div class="value" id="weekActive">-</div></div>
                    </div>
                    
                    <div class="search-bar">
                        <input type="text" id="searchInput" placeholder="搜尋名稱或 Email...">
                        <button onclick="searchUsers()"><i class="fas fa-search"></i> 搜尋</button>
                    </div>
                    
                    <div class="filters">
                        <button class="filter-btn active" onclick="filterUsers('all')">全部學生</button>
                        <button class="filter-btn" onclick="filterUsers('online')">🟢 在線中</button>
                        <button class="filter-btn" onclick="filterUsers('today')">📅 今日活躍</button>
                        <button class="filter-btn" onclick="filterUsers('week')">📊 本週活躍</button>
                    </div>
                    
                    <div class="users-table">
                        <table>
                            <thead>
                                <tr>
                                    <th>姓名</th>
                                    <th>Email</th>
                                    <th>註冊日期</th>
                                    <th>最後活躍</th>
                                    <th>活躍狀態</th>
                                    <th>學習次數</th>
                                    <th>總學習時長</th>
                                </tr>
                            </thead>
                            <tbody id="usersList">
                                <tr><td colspan="7" class="loading">載入中...</td></tr>
                            </tbody>
                        </table>
                        <div id="loadMoreContainer" class="load-more-container" style="display: none;">
                            <button class="load-more-btn" onclick="loadMoreUsers()"><i class="fas fa-chevron-down"></i> 載入更多學生</button>
                        </div>
                    </div>
                </div>
            `;
            
            await updateStats();
            await loadUsers('all', false);
        }

        // 監聽登入狀態
        onAuthStateChanged(auth, async (user) => {
            const appDiv = document.getElementById('app');
            
            if (!user) {
                appDiv.innerHTML = `
                    <div class="unauthorized">
                        <i class="fas fa-lock"></i>
                        <h2>管理員登入</h2>
                        <p>請使用您的 Google 帳號登入</p>
                        <button onclick="loginWithGoogle()" class="btn-toggle" style="margin-top: 20px; padding: 10px 24px;">
                            <i class="fab fa-google"></i> 使用 Google 登入
                        </button>
                    </div>
                `;
                return;
            }
            
            try {
                const userRef = collection(db, 'users');
                const q = query(userRef, where('email', '==', user.email));
                const querySnapshot = await getDocs(q);
                
                let isAdmin = false;
                let isTeacher = false;
                
                querySnapshot.forEach(doc => {
                    const role = doc.data().role || 'user';
                    isAdmin = role === 'admin';
                    isTeacher = role === 'teacher';
                });
                
                currentUserIsAdmin = isAdmin;
                currentUserIsTeacher = isTeacher;
                
                if (!isAdmin && !isTeacher) {
                    appDiv.innerHTML = `
                        <div class="unauthorized">
                            <i class="fas fa-shield-alt"></i>
                            <h2>無權限訪問</h2>
                            <p>此頁面僅限管理員或老師使用</p>
                            <p>您的帳號：${escapeHtml(user.email)}</p>
                            <button onclick="logout()" class="btn-toggle" style="margin-top: 20px;">登出</button>
                        </div>
                    `;
                    return;
                }
                
                await loadAdminInterface(appDiv, user);
            } catch (error) {
                console.error('權限檢查失敗:', error);
                appDiv.innerHTML = `
                    <div class="unauthorized">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h2>發生錯誤</h2>
                        <p>${error.message}</p>
                        <button onclick="logout()" class="btn-toggle" style="margin-top: 20px;">登出</button>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
