<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理後台 · 英語默書練習系統</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }
    
    body {
      background: #f1f5f9;
      padding: 20px;
    }
    
    .container {
      max-width: 1600px;
      margin: 0 auto;
    }
    
    .header {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }
    
    .header h1 {
      color: #1e293b;
      font-size: 24px;
    }
    
    .header h1 i {
      color: #4f46e5;
      margin-right: 10px;
    }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      text-align: center;
    }
    
    .stat-card .label {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 8px;
    }
    
    .stat-card .value {
      color: #1e293b;
      font-size: 32px;
      font-weight: 700;
    }
    
    .search-bar {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }
    
    .search-bar input {
      flex: 1;
      padding: 12px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      min-width: 200px;
    }
    
    .search-bar button {
      padding: 12px 24px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
    }
    
    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }
    
    .filter-btn {
      padding: 8px 16px;
      border: 1px solid #e2e8f0;
      background: white;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
      white-space: nowrap;
    }
    
    .filter-btn:hover {
      background: #f1f5f9;
      border-color: #4f46e5;
    }
    
    .filter-btn.active {
      background: #4f46e5;
      color: white;
      border-color: #4f46e5;
    }
    
    .branch-filter-label {
      font-size: 13px;
      color: #64748b;
      margin-right: 5px;
    }
    
    .users-table {
      background: white;
      border-radius: 12px;
      overflow-x: auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      min-height: 400px;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1300px;
    }
    
    th {
      background: #f8fafc;
      padding: 12px 10px;
      text-align: left;
      color: #475569;
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
    }
    
    td {
      padding: 12px 10px;
      border-bottom: 1px solid #e2e8f0;
      color: #334155;
      font-size: 13px;
      vertical-align: middle;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #64748b;
    }
    
    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #e2e8f0;
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .btn-toggle {
      padding: 6px 12px;
      border: 1px solid #cbd5e1;
      background: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    
    .btn-toggle:hover {
      background: #f1f5f9;
    }
    
    .load-more-btn {
      background: #f1f5f9;
      border: 1px dashed #cbd5e1;
      color: #4f46e5;
      padding: 10px 20px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    .load-more-btn:hover {
      background: #e2e8f0;
      border-color: #4f46e5;
    }
    
    .load-more-container {
      text-align: center;
      padding: 20px;
    }
    
    .unauthorized {
      text-align: center;
      margin-top: 100px;
      padding: 40px;
      background: white;
      border-radius: 12px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    
    .unauthorized i {
      font-size: 64px;
      color: #ef4444;
      margin-bottom: 20px;
    }
    
    /* 標籤樣式 */
    .admin-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #4f46e5;
      color: white;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      margin-left: 6px;
    }
    
    .teacher-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #f59e0b;
      color: white;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 500;
      margin-left: 6px;
    }
    
    .disabled-icon {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #ef4444;
      font-size: 12px;
      margin-left: 6px;
    }
    
    .disabled-icon i {
      font-size: 12px;
    }
    
    .active-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #10b981;
      color: white;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 500;
    }
    
    .disabled-row {
      /* 與正常行一致 */
    }
    
    /* 徽章樣式 */
    .premium-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .premium-true {
      background: #dcfce7;
      color: #166534;
    }
    
    .premium-false {
      background: #fee2e2;
      color: #991b1b;
    }
    
    /* 到期提醒 */
    .expiring-soon {
      color: #f97316;
      font-weight: 500;
    }
    
    .expired-badge {
      color: #ef4444;
      font-weight: 500;
    }
    
    /* 線上狀態 */
    .online-status {
      font-weight: 600;
      white-space: nowrap;
    }
    
    .status-online { color: #059669; }
    .status-recent { color: #059669; }
    .status-today { color: #2563eb; }
    .status-week { color: #f97316; }
    .status-offline { color: #94a3b8; }
    .status-never { color: #94a3b8; font-style: italic; }
    
    .activity-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 4px;
    }
    
    .status-online .activity-indicator { background: #059669; animation: pulse 2s infinite; }
    .status-recent .activity-indicator { background: #059669; }
    .status-today .activity-indicator { background: #2563eb; }
    .status-week .activity-indicator { background: #f97316; }
    .status-offline .activity-indicator { background: #94a3b8; }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    /* 可編輯欄位 */
    .editable-click {
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      transition: background 0.2s;
      display: inline-block;
    }
    
    .editable-click:hover {
      background: #f1f5f9;
    }
    
    .phone-cell, .notes-cell, .displayname-cell, .branch-cell, .publisher-cell {
      position: relative;
      white-space: nowrap;
    }
    
    .phone-display, .notes-display, .displayname-display, .grade-display, .publisher-display, .branch-display {
      display: inline-block;
      margin-right: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .phone-unset, .notes-unset, .publisher-unset, .branch-unset {
      color: #94a3b8;
      font-style: italic;
    }
    
    .edit-input, .phone-input, .notes-input, .publisher-input, .displayname-input, .branch-input {
      width: 140px;
      padding: 4px 8px;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      font-size: 12px;
      margin-right: 4px;
    }
    
    .grade-select {
      width: 100px;
      padding: 4px 6px;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      font-size: 12px;
      margin-right: 4px;
    }
    
    .btn-icon {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 4px;
      margin: 0 2px;
      border-radius: 4px;
      color: #64748b;
      transition: all 0.2s;
    }
    
    .btn-icon:hover {
      background: #e2e8f0;
    }
    
    /* 操作菜單 */
    .action-menu {
      position: relative;
      display: inline-block;
    }
    
    .action-btn {
      background: #f1f5f9;
      color: #4f46e5;
      border: 1px solid #e2e8f0;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    
    .action-btn:hover {
      background: #e2e8f0;
      border-color: #cbd5e1;
    }
    
    .action-dropdown {
      position: fixed;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      z-index: 10000;
      min-width: 170px;
      display: none;
      overflow: hidden;
    }
    
    .menu-item {
      padding: 10px 15px;
      cursor: pointer;
      font-size: 13px;
      color: #1e293b;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #f1f5f9;
    }
    
    .menu-item:last-child {
      border-bottom: none;
    }
    
    .menu-item:hover {
      background: #f8fafc;
    }
    
    .menu-item i {
      width: 18px;
      color: #64748b;
    }
    
    .menu-divider {
      height: 1px;
      background: #e2e8f0;
      margin: 5px 0;
    }
    
    /* 試用期 */
    .trial-display {
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: all 0.2s;
      display: inline-block;
    }
    
    .trial-display:hover {
      background-color: #f1f5f9;
      outline: 1px solid #4f46e5;
    }
    
    .trial-active { color: #059669; font-weight: 600; }
    .trial-expiring { color: #f97316; font-weight: 600; }
    .trial-expired { color: #ef4444; font-weight: 600; }
    
    .trial-badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 12px;
      font-size: 10px;
      margin-left: 4px;
      background: #f1f5f9;
    }
    
    .trial-badge.active { background: #dcfce7; color: #166534; }
    .trial-badge.expiring { background: #fef3c7; color: #92400e; }
    
    /* 合併日期欄樣式 */
    .date-combined {
      font-family: monospace;
      font-size: 11px;
      line-height: 1.6;
      white-space: nowrap;
    }
    
    .date-combined div:first-child {
      margin-bottom: 2px;
    }
    
    @keyframes fadeInOut {
      0% { opacity: 0; transform: translateY(20px); }
      15% { opacity: 1; transform: translateY(0); }
      85% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(20px); }
    }
    
    @media (max-width: 768px) {
      .stats {
        grid-template-columns: repeat(2, 1fr);
      }
      .action-dropdown {
        min-width: 150px;
      }
    }
    
    /* ===== 可編輯欄位包裝器樣式 ===== */
    .notes-cell, .branch-cell, .publisher-cell {
      max-width: 220px;
      min-width: 100px;
    }
    
    .editable-wrapper {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      gap: 4px;
      width: 100%;
    }
    
    .editable-wrapper .editable-display {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      transition: background 0.2s;
    }
    
    .editable-wrapper .editable-display:hover {
      background: #f1f5f9;
    }
    
    .edit-icon {
      flex-shrink: 0;
      font-size: 12px;
      color: #4f46e5;
      cursor: pointer;
      padding: 2px;
      border-radius: 4px;
      transition: all 0.2s;
    }
    
    .edit-icon:hover {
      background: #e2e8f0;
      color: #4338ca;
      transform: scale(1.05);
    }
    
    /* ===== 備註彈窗樣式 ===== */
    .note-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(2px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20000;
      animation: fadeIn 0.2s ease;
    }
    
    .note-modal-content {
      background: #ffffff;
      border-radius: 12px;
      width: 90%;
      max-width: 560px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      animation: slideUp 0.2s ease;
      overflow: hidden;
    }
    
    .note-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px 12px 24px;
      border-bottom: none;
    }
    
    .note-modal-header h3 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      color: #111827;
      letter-spacing: -0.01em;
    }
    
    .note-modal-close {
      background: none;
      border: none;
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      color: #6b7280;
      font-size: 20px;
      transition: all 0.15s ease;
    }
    
    .note-modal-close:hover {
      background: #f3f4f6;
      color: #111827;
    }
    
    .note-modal-body {
      padding: 8px 24px 20px 24px;
    }
    
    .note-edit-textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.5;
      resize: vertical;
      box-sizing: border-box;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      background: #ffffff;
      color: #1f2937;
    }
    
    .array-field-input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.5;
      box-sizing: border-box;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      background: #ffffff;
      color: #1f2937;
    }
    
    .array-field-input:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }
    
    .note-edit-textarea:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }
    
    .note-edit-textarea::placeholder,
    .array-field-input::placeholder {
      color: #9ca3af;
    }
    
    .note-modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      padding: 16px 24px 24px 24px;
      border-top: 1px solid #f0f0f0;
    }
    
    .note-modal-cancel-btn {
      padding: 8px 16px;
      background: transparent;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #6b7280;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    
    .note-modal-cancel-btn:hover {
      background: #f3f4f6;
      color: #374151;
    }
    
    .note-modal-save-btn {
      padding: 8px 20px;
      background: #4f46e5;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: white;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    
    .note-modal-save-btn:hover {
      background: #4338ca;
      transform: translateY(-1px);
    }
    
    .note-modal-save-btn:active {
      transform: translateY(0);
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { 
      getAuth, signOut, onAuthStateChanged, GoogleAuthProvider, signInWithPopup 
    } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
    import { 
      getFirestore, collection, getDocs, getCountFromServer, doc, getDoc, updateDoc,
      query, orderBy, limit, startAfter, where, setDoc, addDoc, arrayUnion, arrayRemove
    } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyABfaBvx5ovgYDGfCMyparh8JjqVtIRr8M",
      authDomain: "eng-dictation-panel.firebaseapp.com",
      projectId: "eng-dictation-panel",
      storageBucket: "eng-dictation-panel.firebasestorage.app",
      messagingSenderId: "428851908520",
      appId: "1:428851908520:web:9ce49c5034ed1d193fd79d"
    };

    let app;
    try {
      if (!getApps().length) {
        app = initializeApp(firebaseConfig);
      } else {
        app = getApps()[0];
      }
    } catch (error) {
      console.error('Firebase initialization failed:', error);
      app = getApps()[0];
    }

    const auth = getAuth(app);
    const db = getFirestore(app);

    // Global variables
    let currentFilter = 'all';
    let currentBranchFilter = 'all';
    let lastVisible = null;
    let isLoading = false;
    let hasMore = true;
    const PAGE_SIZE = 20;
    
    let currentUserIsAdmin = false;
    let currentUserIsTeacher = false;
    let currentUserBranch = [];
    
    let selectedUserIdsForNotification = [];

    // XSS protection
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>"']/g, function(m) {
        switch(m) {
          case '&': return '&amp;';
          case '<': return '&lt;';
          case '>': return '&gt;';
          case '"': return '&quot;';
          case "'": return '&#039;';
          default: return m;
        }
      });
    }

    // Check if text is truncated
    function isTextTruncated(element) {
      if (!element) return false;
      return element.scrollWidth > element.clientWidth;
    }
    
    // Bind editable tooltips for truncated text
    function bindEditableTooltips() {
      document.querySelectorAll('.editable-wrapper').forEach(wrapper => {
        const displaySpan = wrapper.querySelector('.editable-display');
        const icon = wrapper.querySelector('.edit-icon');
        
        if (!displaySpan || !icon) return;
        
        const isTruncated = isTextTruncated(displaySpan);
        icon.style.display = 'none';
        wrapper.dataset.isTruncated = isTruncated;
        
        const handleMouseEnter = (e) => {
          const w = e.currentTarget;
          const i = w.querySelector('.edit-icon');
          const truncated = w.dataset.isTruncated === 'true';
          if (truncated && i) i.style.display = 'inline-block';
        };
        
        const handleMouseLeave = (e) => {
          const w = e.currentTarget;
          const i = w.querySelector('.edit-icon');
          if (i) i.style.display = 'none';
        };
        
        wrapper.removeEventListener('mouseenter', handleMouseEnter);
        wrapper.removeEventListener('mouseleave', handleMouseLeave);
        wrapper.addEventListener('mouseenter', handleMouseEnter);
        wrapper.addEventListener('mouseleave', handleMouseLeave);
      });
    }
    
    // Show note modal for editing
    async function showNoteModal(content, userId) {
      const cell = document.getElementById(`notes-${userId}`);
      let currentNote = content;
      
      if (cell) {
        const displaySpan = cell.querySelector('.editable-display');
        if (displaySpan) {
          currentNote = displaySpan.textContent;
        }
      }
      
      const originalContent = currentNote === '未填寫' ? '' : currentNote;
      
      const modal = document.createElement('div');
      modal.className = 'note-modal-overlay';
      modal.innerHTML = `
        <div class="note-modal-content">
          <div class="note-modal-header">
            <h3>Edit Note</h3>

    function stringToArray(str) {
      if (!str || str.trim() === '') return [];

    function hasIntersection(arr1, arr2) {
      if (!arr1 || !arr2) return false;
      if (arr1.length === 0 || arr2.length === 0) return false;
      return arr1.some(item => arr2.includes(item));
    }

    function formatDate(dateValue) {
      if (!dateValue) return '-';
      try {
        let date;
        if (dateValue.seconds) {
          date = new Date(dateValue.seconds * 1000);
        } else {
          date = new Date(dateValue);
        }
        if (isNaN(date.getTime())) return '-';
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
      } catch {
        return '-';
      }
    }

    function getExpiryDisplay(expiresAt) {
      if (!expiresAt) return '-';
      const expiryDate = new Date(expiresAt);
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const daysLeft = Math.ceil((expiryDate - today) / (1000 * 60 * 60 * 24));
      
      if (daysLeft < 0) {
        return '<span class="expired-badge">Expired</span>';
      } else if (daysLeft <= 7) {
        return `<span class="expiring-soon">${daysLeft} days left</span>`;
      } else {
        return formatDate(expiresAt);
      }
    }

    function getOnlineStatus(lastLoginAt, isDisabled = false) {
      if (isDisabled) {
        return '<span class="online-status status-offline"><span class="activity-indicator"></span>Disabled</span>';
      }
      if (!lastLoginAt) {
        return '<span class="online-status status-never"><span class="activity-indicator"></span>Never</span>';
      }
      const last = new Date(lastLoginAt);
      const now = new Date();
      const diffMinutes = Math.floor((now - last) / (1000 * 60));
      
      if (diffMinutes < 5) {
        return '<span class="online-status status-online"><i class="fas fa-circle" style="font-size: 8px; margin-right: 4px;"></i>Online</span>';
      } else if (diffMinutes < 60) {
        return '<span class="online-status status-recent"><span class="activity-indicator"></span>Recent</span>';
      } else if (diffMinutes < 1440) {
        const hours = Math.floor(diffMinutes / 60);
        return `<span class="online-status status-today"><span class="activity-indicator"></span>${hours}h ago</span>`;
      } else if (diffMinutes < 10080) {
        const days = Math.floor(diffMinutes / 1440);
        return `<span class="online-status status-week"><span class="activity-indicator"></span>${days}d ago</span>`;
      } else {
        const days = Math.floor(diffMinutes / 1440);
        return `<span class="online-status status-offline"><span class="activity-indicator"></span>${days}d ago</span>`;
      }
    }

    function getTrialStatus(trialEndAt) {
      if (!trialEndAt) return '';
      const now = new Date();
      const trialDate = new Date(trialEndAt);
      const daysLeft = Math.ceil((trialDate - now) / (1000 * 60 * 60 * 24));
      if (daysLeft < 0) return 'trial-expired';
      if (daysLeft <= 7) return 'trial-expiring';
      return 'trial-active';
    }

    function getTrialBadge(trialEndAt) {
      if (!trialEndAt) return '';
      const now = new Date();
      const trialDate = new Date(trialEndAt);
      const daysLeft = Math.ceil((trialDate - now) / (1000 * 60 * 60 * 24));
      if (daysLeft < 0) return '<span class="trial-badge">Expired</span>';
      if (daysLeft <= 7) return `<span class="trial-badge expiring">${daysLeft} days left</span>`;
      return '<span class="trial-badge active">Active</span>';
    }

    function formatTrialDate(trialEndAt) {
      if (!trialEndAt) return '-';
      try {
        return new Date(trialEndAt).toLocaleDateString('zh-HK');
      } catch {
        return '-';
      }
    }

    function positionMenu(menu, button) {
      const rect = button.getBoundingClientRect();
      const menuWidth = 180;
      const menuHeight = menu.scrollHeight || 280;
      
      let left = rect.left;
      if (rect.left + menuWidth > window.innerWidth) {
        left = rect.right - menuWidth;
      }
      if (left < 5) left = 5;
      
      let top = rect.bottom + 5;
      if (rect.bottom + menuHeight + 10 > window.innerHeight) {
        top = rect.top - menuHeight - 5;
      }
      if (top < 5) top = 5;
      
      menu.style.left = `${left}px`;
      menu.style.top = `${top}px`;
    }

    async function loadUsers(filter, loadMore = false) {
      const usersList = document.getElementById('usersList');
      const loadMoreContainer = document.getElementById('loadMoreContainer');
      if (!usersList) return;
      
      if (!loadMore) {
        usersList.innerHTML = ' <td colspan="13" class="loading"><span class="loading-spinner"></span> Loading... </div>';
        if (loadMoreContainer) loadMoreContainer.style.display = 'none';
      }
      
      if (isLoading || (!loadMore && !hasMore && lastVisible !== null)) return;
      isLoading = true;
      
      try {
        const usersRef = collection(db, 'users');
        let constraints = [];
        
        if (!currentUserIsAdmin && !currentUserIsTeacher) {
          usersList.innerHTML = ' <td colspan="13" class="loading">No permission </div>';
          isLoading = false;
          return;
        }
        
        if (!currentUserIsAdmin && currentUserIsTeacher) {
          if (!currentUserBranch || currentUserBranch.length === 0) {
            usersList.innerHTML = ' <td colspan="13" class="loading">Your account has no group assigned. Contact admin. </div>';
            isLoading = false;
            return;
          }
        }
        
        if (currentUserIsAdmin && currentBranchFilter !== 'empty' && currentBranchFilter !== 'all') {
          constraints.push(where('branch', 'array-contains', currentBranchFilter));
        }
        
        if (filter === 'premium') {
          constraints.push(where('premium', '==', true));
        } else if (filter === 'free') {
          constraints.push(where('premium', '==', false));
        } else if (filter === 'trial-active') {
          const now = new Date().toISOString();
          constraints.push(where('trialEndAt', '>', now));
        } else if (filter === 'expiring-soon') {
          const today = new Date();
          today.setHours(0, 0, 0, 0);
          const sevenDaysLater = new Date(today.getTime() + 7 * 24 * 60 * 60 * 1000);
          constraints.push(where('premium', '==', true));
          constraints.push(where('expiresAt', '>', today.toISOString()));
          constraints.push(where('expiresAt', '<=', sevenDaysLater.toISOString()));
        } else if (filter === 'expired') {
          const today = new Date();
          today.setHours(0, 0, 0, 0);
          constraints.push(where('premium', '==', true));
          constraints.push(where('expiresAt', '<=', today.toISOString()));
        } else if (filter === 'teacher') {
          constraints.push(where('role', '==', 'teacher'));
        } else if (filter === 'disabled') {
          constraints.push(where('isDisabled', '==', true));
        }
        
        let q;
        if (constraints.length > 0) {
          q = lastVisible 
            ? query(usersRef, ...constraints, orderBy('createdAt', 'desc'), startAfter(lastVisible), limit(PAGE_SIZE))
            : query(usersRef, ...constraints, orderBy('createdAt', 'desc'), limit(PAGE_SIZE));
        } else {
          q = lastVisible 
            ? query(usersRef, orderBy('createdAt', 'desc'), startAfter(lastVisible), limit(PAGE_SIZE))
            : query(usersRef, orderBy('createdAt', 'desc'), limit(PAGE_SIZE));
        }
        
        const snapshot = await getDocs(q);
        lastVisible = snapshot.docs[snapshot.docs.length - 1];
        hasMore = snapshot.docs.length === PAGE_SIZE;
        
        let filteredDocs = snapshot.docs;
        
        if (currentUserIsAdmin && currentBranchFilter === 'empty') {
          filteredDocs = snapshot.docs.filter(doc => {
            const branch = doc.data().branch;
            return !branch || (Array.isArray(branch) && branch.length === 0) || branch === '';
          });
        }
        
        if (!currentUserIsAdmin && currentUserIsTeacher && currentUserBranch.length > 0) {
          filteredDocs = snapshot.docs.filter(doc => {
            const userBranch = doc.data().branch;
            if (!userBranch) return false;
            const userBranchArray = Array.isArray(userBranch) ? userBranch : [userBranch];
            return hasIntersection(currentUserBranch, userBranchArray);
          });
        }
        
        let html = loadMore ? usersList.innerHTML : '';
        filteredDocs.forEach(doc => {
          html += generateUserRow(doc.id, doc.data());
        });
        
        if (filteredDocs.length === 0 && !loadMore) {
          usersList.innerHTML = ' <td colspan="13" class="loading">No users found </div>';
        } else {
          usersList.innerHTML = html;
          bindCheckboxEvents();
          bindEditableTooltips();
        }
        
        if (loadMoreContainer) {
          loadMoreContainer.style.display = hasMore ? 'block' : 'none';
        }
      } catch (error) {
        console.error('Failed to load users:', error);
        if (!loadMore) usersList.innerHTML = ` <td colspan="13" class="loading">Failed: ${error.message} </div>`;
      } finally {
        isLoading = false;
      }
    }

      document.getElementById('notifBranch').value = '';
      
      const targetSelect = document.getElementById('notifTarget');
      const branchDiv = document.getElementById('branchSelectDiv');
      const selectedDiv = document.getElementById('selectedCountDiv');
      
      if (targetSelect.value === 'branch') {
        branchDiv.style.display = 'block';
        selectedDiv.style.display = 'none';
      } else if (targetSelect.value === 'selected') {
        branchDiv.style.display = 'none';
        selectedDiv.style.display = selectedIds.length > 0 ? 'block' : 'none';
      } else {
        branchDiv.style.display = 'none';
        selectedDiv.style.display = 'none';
      }
      
      targetSelect.onchange = function() {
        if (this.value === 'branch') {
          branchDiv.style.display = 'block';
          selectedDiv.style.display = 'none';
        } else if (this.value === 'selected') {
          branchDiv.style.display = 'none';
          selectedDiv.style.display = window.selectedUserIds.length > 0 ? 'block' : 'none';
        } else {
          branchDiv.style.display = 'none';
          selectedDiv.style.display = 'none';
        }
      };
      
      document.getElementById('sendNotificationModal').style.display = 'flex';
    };
    
    window.closeSendNotification = () => {
      document.getElementById('sendNotificationModal').style.display = 'none';
    };
    
    window.sendNotification = async () => {
      const title = document.getElementById('notifTitle').value.trim();
      const content = document.getElementById('notifContent').value.trim();
      
      if (!title || !content) {
        showToast('Please fill in title and content');
        return;
      }
      
      showToast('Notification sent', 'success');
      closeSendNotification();
    };
    
    async function loadAdminInterface(container, user) {
      currentUserBranch = await getCurrentUserBranch();
      
      container.innerHTML = `
        <div class="container">
          <div class="header">
            <h1><i class="fas fa-chalkboard-teacher"></i> Admin Panel · English Dictation System</h1>
            <div><span style="margin-right:15px;">${escapeHtml(user.email)} ${currentUserIsAdmin ? 'Admin' : (currentUserIsTeacher ? 'Teacher' : '')} ${currentUserBranch.length > 0 ? `(${currentUserBranch.join(', ')})` : ''}</span><button onclick="logout()" class="btn-toggle">Logout</button></div>
          </div>
          
          <div class="stats">
            <div class="stat-card"><div class="label">Total Users</div><div class="value" id="totalUsers">-</div></div>
            <div class="stat-card"><div class="label">Disabled</div><div class="value" id="disabledUsers">-</div></div>
            <div class="stat-card"><div class="label">Premium</div><div class="value" id="premiumUsers">-</div></div>
            <div class="stat-card"><div class="label">Free</div><div class="value" id="freeUsers">-</div></div>
          </div>
          
          ${currentUserIsAdmin ? `
          <div class="notifications-section" style="background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
              <h3 style="font-size: 18px;"><i class="fas fa-bell"></i> Notification Settings</h3>
              <button class="btn-toggle" onclick="toggleNotificationSettings()">Manage</button>
            </div>
            <div id="notificationSettingsPanel" style="display: none;">
              <div style="margin-bottom: 20px;">
                <h4 style="font-size: 14px; margin-bottom: 10px;">Notification Scenarios</h4>
                <div style="display: flex; flex-wrap: wrap; gap: 15px;">
                  <label><input type="checkbox" id="notifyNewUnit" checked> New Unit</label>
                  <label><input type="checkbox" id="notifyAnnouncement" checked> Announcement</label>
                  <label><input type="checkbox" id="notifyAccountDisabled" checked> Account Disabled</label>
                  <label><input type="checkbox" id="notifyAccountEnabled" checked> Account Enabled</label>
                  <label><input type="checkbox" id="notifyTrialExpiring" checked> Trial Expiring</label>
                  <label><input type="checkbox" id="notifySubscriptionExpiring" checked> Subscription Expiring</label>
                  <label><input type="checkbox" id="notifySystemMaintenance" checked> System Maintenance</label>
                </div>
              </div>
              <button class="btn-toggle" onclick="saveNotificationSettings()">Save Settings</button>
            </div>
          </div>
          ` : ''}
          
          <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search by email, name, phone or note...">
            <button onclick="searchUsers()"><i class="fas fa-search"></i> Search</button>
          </div>
          
          ${currentUserIsAdmin || currentUserIsTeacher ? `
          <div style="margin-bottom: 15px; display: flex; gap: 10px; align-items: center;">
            <button class="btn-toggle" onclick="openSendNotification()" style="background: #4f46e5; color: white;">
              <i class="fas fa-paper-plane"></i> Send Notification
            </button>
            ${currentUserIsAdmin ? `
            <button class="btn-toggle" onclick="batchResetStructure()" style="background: #f97316; color: white;">
              <i class="fas fa-sync-alt"></i> Batch Reset Structure
            </button>
            ` : ''}
          </div>
          ` : ''}
          
          <div class="filters">
            <button class="filter-btn" onclick="filterUsers('all', event)">All</button>
            <button class="filter-btn" onclick="filterUsers('premium', event)">Premium</button>
            <button class="filter-btn" onclick="filterUsers('free', event)">Free</button>
            <button class="filter-btn" onclick="filterUsers('trial-active', event)">Trial Active</button>
            <button class="filter-btn" onclick="filterUsers('expiring-soon', event)">Expiring Soon</button>
            <button class="filter-btn" onclick="filterUsers('expired', event)">Expired</button>
            <button class="filter-btn" onclick="filterUsers('teacher', event)">Teachers</button>
            <button class="filter-btn" onclick="filterUsers('disabled', event)">Disabled</button>
          </div>
          
          ${currentUserIsAdmin ? `
          <div class="filters" style="margin-top: 10px;">
            <span class="branch-filter-label">Group Filter:</span>
            <button class="filter-btn" onclick="filterByBranch('all', event)">All</button>
            <button class="filter-btn" onclick="filterByBranch('empty', event)">Not Set</button>
            <button class="filter-btn" onclick="showBranchPrompt()">+ Custom</button>
          </div>
          ` : ''}
          
          <div class="users-table">
            <table>
              <thead>
                <tr>
                  <th style="width: 40px;"><input type="checkbox" id="selectAllCheckbox" onclick="toggleSelectAll()"></th>
                  <th>User</th><th>Email</th><th>Phone</th><th>Note</th><th>Group</th><th>Grade</th><th>Textbook</th><th>Registered / Recent</th><th>Status</th><th>Plan</th><th>Expiry</th><th>Trial</th><th>Actions</th>
                </tr>
              </thead>
              <tbody id="usersList"><tr><td colspan="14" class="loading"><span class="loading-spinner"></span> Loading...</td></tr></tbody>
            </table>
            <div id="loadMoreContainer" class="load-more-container" style="display:none;"><button class="load-more-btn" onclick="loadMoreUsers()"><i class="fas fa-chevron-down"></i> Load More</button></div>
          </div>
        </div>
        
        <div id="sendNotificationModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10001; align-items: center; justify-content: center;">
          <div style="background: white; border-radius: 16px; padding: 24px; width: 90%; max-width: 500px;">
            <h3 style="margin-bottom: 20px;"><i class="fas fa-bell"></i> Send Notification</h3>
            <div style="margin-bottom: 15px;"><label>Title:</label><input type="text" id="notifTitle" style="width: 100%; padding: 8px; border: 1px solid #e2e8f0; border-radius: 6px;"></div>
            <div style="margin-bottom: 15px;"><label>Content:</label><textarea id="notifContent" rows="4" style="width: 100%; padding: 8px; border: 1px solid #e2e8f0; border-radius: 6px;"></textarea></div>
            <div style="margin-bottom: 15px;">
              <label>Recipients:</label>
              <select id="notifTarget" style="width: 100%; padding: 8px; border: 1px solid #e2e8f0; border-radius: 6px;">
                <option value="all">All Users</option>
                ${currentUserIsAdmin ? '<option value="branch">Specific Group</option>' : (currentUserIsTeacher && currentUserBranch.length > 0 ? '<option value="branch">My Group</option>' : '')}
                <option value="selected">Selected Users</option>
              </select>
            </div>
            <div id="branchSelectDiv" style="display: none; margin-bottom: 15px;"><label>Group:</label><input type="text" id="notifBranch" placeholder="Enter group name" style="width: 100%; padding: 8px; border: 1px solid #e2e8f0; border-radius: 6px;"></div>
            <div id="selectedCountDiv" style="display: none; margin-bottom: 15px; color: #4f46e5;">Selected <span id="selectedCount">0</span> users</div>
            <div style="display: flex; gap: 10px; justify-content: flex-end;"><button class="btn-toggle" onclick="closeSendNotification()">Cancel</button><button class="btn-toggle" onclick="sendNotification()" style="background: #4f46e5; color: white;">Send</button></div>
          </div>
        </div>
      `;
      
      window.filterUsers = (filter, ev) => {
        const mainFilters = document.querySelector('.filters');
        if (mainFilters) {
          mainFilters.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        }
        if (filter !== 'all' && ev && ev.target) ev.target.classList.add('active');
        currentFilter = filter;
        lastVisible = null;
        hasMore = true;
        loadUsers(filter, false);
      };
      
      window.filterByBranch = (branch, ev) => {
        const allFilters = document.querySelectorAll('.filters');
        const branchFilters = allFilters[1];
        if (branchFilters) branchFilters.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        if (branch !== 'all' && ev && ev.target) ev.target.classList.add('active');
        currentBranchFilter = branch;
        lastVisible = null;
        hasMore = true;
        loadUsers(currentFilter, false);
      };
      
      window.showBranchPrompt = () => {
        const branch = prompt('Enter group name (max 20 chars):');
        if (branch && branch.trim()) {
          const trimmedBranch = branch.trim();
          if (trimmedBranch.length > 20) alert('Group name too long');
          else filterByBranch(trimmedBranch);
        }
      };
      
      window.searchUsers = () => performSearch();
      window.loadMoreUsers = () => loadUsers(currentFilter, true);
      
      await updateStats();
      await loadUsers('all', false);
    }
    
    onAuthStateChanged(auth, async (user) => {
      const appDiv = document.getElementById('app');
      if (!user) {
        appDiv.innerHTML = `<div class="unauthorized"><i class="fas fa-lock"></i><h2>Admin Login</h2><p>Please sign in with your Google account</p><button onclick="loginWithGoogle()" class="btn-toggle"><i class="fab fa-google"></i> Sign in with Google</button></div>`;
        return;
      }
      try {
        const userDoc = await getDoc(doc(db, 'users', user.uid));
        const userData = userDoc.data() || {};
        
        if (userData.isDisabled === true) {
          console.log('Account disabled');
          await signOut(auth);
          alert('Your account has been disabled. Please contact admin.');
          window.location.href = './login.html';
          return;
        }
        
        currentUserIsAdmin = userData.role === 'admin';
        currentUserIsTeacher = userData.role === 'teacher';
        
        if (!currentUserIsAdmin && !currentUserIsTeacher) {
          appDiv.innerHTML = `<div class="unauthorized"><i class="fas fa-shield-alt"></i><h2>Access Denied</h2><p>This page is for admins and teachers only.</p><p>Your account: ${escapeHtml(user.email)}</p><button onclick="logout()" class="btn-toggle">Logout</button></div>`;
          return;
        }
        await loadAdminInterface(appDiv, user);
      } catch (error) {
        console.error('Permission check failed:', error);
        appDiv.innerHTML = `<div class="unauthorized"><i class="fas fa-exclamation-triangle"></i><h2>Error</h2><p>${error.message}</p><button onclick="logout()" class="btn-toggle">Logout</button></div>`;
      }
    });
  </script>
</body>
</html>
